<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | Mzansi Builds</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">🟢 Mzansi Builds</a>
    <div class="nav-links">
      <a href="index.html">Feed</a>
      <a href="login.html">Login</a>
    </div>
  </nav>

  <div class="container" style="max-width: 480px; margin-top: 4rem;">
    <h2 class="page-title">Create Account</h2>

    <div id="error-msg" class="alert alert-error" style="display:none;"></div>
    <div id="success-msg" class="alert alert-success" style="display:none;"></div>

    <div class="card">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="your_username" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label>Bio <span style="color:var(--text-muted)">(optional)</span></label>
        <textarea id="bio" rows="3" placeholder="Tell the community about yourself..."></textarea>
      </div>
      <div class="form-group">
        <label>GitHub URL <span style="color:var(--text-muted)">(optional)</span></label>
        <input type="url" id="github_url" placeholder="https://github.com/yourname" />
      </div>
      <button class="btn btn-green" id="register-btn" style="width:100%;">Create Account</button>
    </div>

    <p style="text-align:center; margin-top:1rem; color: var(--text-muted);">
      Already have an account? <a href="login.html">Login</a>
    </p>
  </div>

  <script type="module" src="../js/auth.js"></script>
</body>
</html>
